{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% block title %}CompanyHub{% endblock %}
    </title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- AOS Animation -->

    <link rel="stylesheet"
          href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- Global Styles -->

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">

    <!-- Section Styles -->

    <link rel="stylesheet" href="{% static 'css/hero.css' %}">
    <link rel="stylesheet" href="{% static 'css/about.css' %}">
    <link rel="stylesheet" href="{% static 'css/why.css' %}">
    <link rel="stylesheet" href="{% static 'css/services.css' %}">
    <link rel="stylesheet" href="{% static 'css/achievement.css' %}">
    <link rel="stylesheet" href="{% static 'css/portfolio.css' %}">

    {% block css %}

    {% endblock %}

</head>

<body>

    {% include "includes/navbar.html" %}

    <main>

        {% block content %}

        {% endblock %}

    </main>

    {% include "includes/footer.html" %}

    <!-- Bootstrap -->

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

    <!-- AOS -->

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 900,
            once: true,
            easing: "ease-in-out"
        });
    </script>

    <!-- Project JS -->

    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/navbar.js' %}"></script>
    <script src="{% static 'js/home.js' %}"></script>
    <script src="{% static 'js/counter.js' %}"></script>

    {% block js %}

    {% endblock %}

</body>

</html>
