{% extends 'base/base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h2 class="mb-4 text-center">
                        Login
                    </h2>

                    <form method="post">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
