<section id="about" class="about-section">

    <div class="container">

        <div class="row align-items-center g-5">

            <div class="col-lg-6 about-image">

    {% if about.image %}
    <img src="{{ about.image.url }}"
         alt="{{ about.company_name }}">
    {% endif %}

</div>

            <div class="col-lg-6">

                <span class="badge bg-primary mb-3">
                    ABOUT COMPANY
                </span>

                <h2 class="display-5 fw-bold mb-4">

                    {{ about.title }}

                </h2>

                <p class="lead">

                    {{ about.short_description }}

                </p>

                <div class="row mt-4">

                    <div class="col-md-6">

                        <div class="info-card">

                            <i class="bi bi-bullseye"></i>

                            <h5>Mission</h5>

                            <p>{{ about.mission }}</p>

                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="info-card">

                            <i class="bi bi-eye"></i>

                            <h5>Vision</h5>

                            <p>{{ about.vision }}</p>

                        </div>

                    </div>

                </div>

                <div class="mt-4">

                    <h4>

                        {{ about.experience_years }}+

                        Years of Experience

                    </h4>

                </div>

            </div>

        </div>

    </div>

</section>
